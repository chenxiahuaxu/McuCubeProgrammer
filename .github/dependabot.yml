version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "auto"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    ignore:
      # Major version bumps need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
